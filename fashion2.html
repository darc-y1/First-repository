<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louve Collection - Summer Coats</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-red: #da1f16;
            --brand-pink-circle: #dc584a;
            --brand-black: #1a1a1a;
            --brand-white: #fafafa;
            /* Ease-in transition for interactive elements */
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--brand-red);
            color: var(--brand-white);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--brand-red); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); }

        /* --- Header / Navigation --- */
        header {
            position: fixed; top: 0; width: 100%;
            padding: 30px 8%;
            display: grid;
            grid-template-columns: repeat(6, auto);
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        header a {
            text-decoration: none; color: inherit;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
        }
        
        header a:hover { opacity: 0.7; transform: translateY(-2px); }

        /* --- Main Hero Layout --- */
        .hero {
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            padding: 0 8%;
            position: relative;
        }

        /* --- Right Vertical labels --- */
        .side-text {
            position: fixed; right: 20px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 44px;
            z-index: 100;
        }
        .side-text span {
            writing-mode: vertical-rl;
            font-size: 8px; letter-spacing: 0.35em;
            color: rgb(255, 255, 255);
            font-weight: 700; text-transform: uppercase;
        }

        /* --- Right Side (Product Details) --- */
        .hero-right {
            padding-left: 10%;
            z-index: 10;
            display: flex; flex-direction: column; gap: 5px;
        }

        .hero-right h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 8vw, 7.5rem);
            font-weight: 400; line-height: 0.85;
            letter-spacing: -2px; margin-bottom: 20px;
        }

        .collection-meta {
            font-size: 2.2rem; font-weight: 700; text-transform: lowercase;
            margin-bottom: 0px;
        }

        .size-tag {
            font-family: 'Playfair Display', serif;
            font-style: italic; font-weight: 400;
            font-size: 1.8rem; margin-bottom: 35px;
            opacity: 0.8;
        }

        .stock-block p {
            font-weight: 800; font-size: 1.2rem;
            margin-bottom: 10px; text-transform: uppercase;
        }
        .stars { font-size: 1.4rem; color: #fff; letter-spacing: 3px; }

        .cta-pill {
            display: block; width: 100%; max-width: 480px; height: 75px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px; margin-top: 30px;
            transition: var(--transition); cursor: pointer;
            font-family: cursive;
            font-weight: 500px;
        }
        .cta-pill:hover { background: rgba(255, 255, 255, 1); transform: scale(1.03); }

        /* --- Left Side (Model) --- */
        .hero-left {
            position: relative; display: flex;
            justify-content: center; align-items: center;
        }

        .pink-circle {
            position: absolute;
            width: 500px; height: 500px;
            background: var(--brand-pink-circle);
            border-radius: 50%;
            z-index: 1;
        }

        .model-img {
            height: 100%; max-height: 90vh;
            display: block; position: relative;
            z-index: 2;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.3));
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .hero { grid-template-columns: 1fr; padding-top: 150px; height: auto; }
            .hero-right { text-align: center; padding: 0 5%; order: 1; margin-top: -100px; padding-bottom: 100px; }
            .hero-right h1 { font-size: 5rem; line-height: 1; }
            .hero-left { order: 2; height: 80vh; }
            .cta-pill { margin: 30px auto; }
            .vertical-labels { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#">Order</a>
        <a href="#">Order</a>
        <a href="#">Visit</a>
        <a href="#">Website</a>
        <a href="#">Black</a>
        <a href="#">Fashion</a>
    </header>

    <main class="hero">
        <div class="side-text">
            <span>New</span>
            <span>New</span>
            <span>New</span>
            <span>New</span>
        </div>

        <section class="hero-right">
            <h1>SUMMER COATS</h1>
            <p class="collection-meta">louve collection</p>
            <p class="size-tag">size 56i</p>
            
            <div class="stock-block">
                <p>NEW STOCK</p>
                <div class="stars">★★★★</div>
            </div>

            <button class="cta-pill" aria-label="Explore the collection">EXPLORE THE COLLECTION</button>
        </section>

        <section class="hero-left">
            <div class="pink-circle"></div>
            <img src="image 2.png" alt="Model in tailored black coat" class="model-img">
        </section>
    </main>

</body>
</html>
