<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .button{
        padding: 1rem 2rem;
        text-decoration: none;
        border: none;
        color: #fff;
        padding: 16px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        transition-duration: 0.4s;
        cursor: pointer;
       }
         a{
            color: white;
            position: relative;
        }
        .button{
            font-weight: 500;
            border-radius: 2em;
            padding: 0.75rem 1.5rem;
            background-color: rgba(255,255 ,255, 0.116);
            backdrop-filter: blur(10px);
            transform: scale(1.1);
            transition: 0.2s ease-in-out;
        }
        .button-gradient {
            position: absolute;
            background: linear-gradient(20deg, rgb(241, 76, 202) 0%, rgb(70, 91, 245) 100%);
            top: 0;
            bottom: 0;
            right: 0;;
            left: 0;
            z-index: -1;
            border-radius: 2em;
            box-shadow: -5px 0 10px rgb(241, 76, 202),
                        5px 0 10px rgb(70, 91, 245);
            transform: translateY(10px);            
        }
        .button:hover {
            transform: translateY(10px);
            box-shadow: -5px 0 50px rgb(241, 76, 202),
                        5px 0 50px rgb(70, 91, 245);
        }
        body{
            text-align: center;
            background: linear-gradient(to right top, #d16ba5, #c777b9, #ba83ca, #aa8fd8, #9a9ae1, #8aa7ec,
             #79b3f4, #69bff8, #52cffe, #41dfff, #46eefa, #5ffbf1);
             color: #100000;
             font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="logo.png" alt="We Fashion" class="header-logo" height="200" width="300">
    </div>
    <div class="logo">We Fashion</div>
    <p>Welcome to We Fashion</p><br>
    <p>Please tap on the button below to explore more of our content.</p>
    
    <a href="home.html">
            <div class="button">Explore More</div>
            <div class="button-gradient"></div>
        </a>
</body>
</html>
